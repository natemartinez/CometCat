<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>CometCat</title>


    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.0/css/bootstrap.min.css" integrity="sha384-9gVQ4dYFwwWSjIDZnLEWnxCjeSWFphJiwGPXr1jddIhOegiu1FwO5qRGvFXOdJZ4" crossorigin="anonymous">
  
    <link rel="stylesheet" href="/style.css">

    <!-- Font Awesome JS -->
    <script defer src="https://use.fontawesome.com/releases/v5.0.13/js/solid.js" integrity="sha384-tzzSw1/Vo+0N5UhStP3bvwWPq+uvzCMfrN1fEFe+xBmv1C/AtVX5K0uZtmcHitFZ" crossorigin="anonymous"></script>
    <script defer src="https://use.fontawesome.com/releases/v5.0.13/js/fontawesome.js" integrity="sha384-6OIrr52G08NpOFSZdxxz1xdNSndlD4vdcf/q2myIUVO0VsqaGHJsB0RaBE01VTOY" crossorigin="anonymous"></script>
</head>

<body>
    <div class="wrapper">
       
        <nav id="sidebar">
            <div class="sidebar-header">
                <img src="/images/logo.png" alt="cat jumping over words" id="logo">
            </div>

            <ul class="list-unstyled components">
                
                <li class="active">
                    <a href="/index.html">Home</a>
                 
                </li>
                <li>
                    <a id="firstItem" href="#">Our World</a>
                </li>
                <li>
                    <a id="secondItem" href="#pageSubmenu" data-toggle="collapse" aria-expanded="false">Our Space Neighbors</a>
                   
                </li>

                <li>
                    <a id="thirdItem"href="#">Far Far Away</a>
                </li>

                <li>
                    <a id="fourthItem" href="#">Space Explorers</a>
                </li>

                <li>
                    <a id="fifthItem" href="#">Gadgets & Tech</a>
                </li>

                <li>
                    <a id="sixthItem" href="#">Comet Cadets</a>
                </li>
            </ul>


        </nav>

      
        <div id="content">
                <div class="container-fluid" style="position:relative ;">
                    <button type="button" id="sidebarCollapse" class="btn btn-info" title="toggle_sidebar">
                        <i class="fas fa-align-left"></i>   
                    </button>

                   
                    <img src="/images/nature.jpg" alt="trees" class="wallpaper" id="nature">
                    <div class="header"><p>Welcome aboard to the CometCat!</p></div>
                </div>
          


            <div class="line"></div>

           <div class="container">
             <div class="row justify-content-center">
               <div id="earth_big_block">
                    <img src="/images/earth.jpg" alt="earth from space" style="width:250px">
               </div>
            </div>
              
           </div>

            <div class="line"></div>

            
            <div class="line"></div>

          

            <div class="line"></div>

            
        </div>
    </div>

    
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js" integrity="sha384-cs/chFZiN24E4KMATLdqdvsezGxaGsi4hLGOzlXwp5UZB1LY//20VyM2taTB4QvJ" crossorigin="anonymous"></script>
    
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.0/js/bootstrap.min.js" integrity="sha384-uefMccjFJAIv6A+rW+L4AHf99KvxDjWSu1z9VI8SKNVmz4sk7buKt/6v9KI65qnm" crossorigin="anonymous"></script>

    <script type="text/javascript">
        $(document).ready(function () {

            $('#sidebarCollapse').on('click', function () {
                $('#sidebar').toggleClass('active');

                $('#logo').toggleClass('shrink')

                $('.header').toggleClass('push')
            });
        });
    </script>
</body>

</html>
